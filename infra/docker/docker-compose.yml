name: nexus-dev

services:
  postgres:
    image: postgres:18
    container_name: nexus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nexus_user
      POSTGRES_PASSWORD: nexus_password
      POSTGRES_DB: NEXUSDEVv3
    ports:
      - "5433:5432"
    volumes:
      - nexus-postgres-data:/var/lib/postgresql

  redis:
    image: redis:8
    container_name: nexus-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - nexus-redis-data:/data

  # NOTE (local dev): the API service is commented out to avoid port 8000 conflicts
  # with the NestJS dev server run from the nexus-enterprise monorepo. We
  # generally don't need this container during development since we run the
  # API with `npm run dev:api` against the same Postgres/Redis.
  # api:
  #   build:
  #     context: ../..
  #     dockerfile: apps/api/Dockerfile
  #   image: ghcr.io/paulgagnon1969/ncc-api:chunk-v1
  #   container_name: nexus-api
  #   restart: unless-stopped
  #   env_file:
  #     - ../../apps/api/.env.docker
  #   ports:
  #     - "8000:8000"
  #   depends_on:
  #     - postgres
  #     - redis

  # Shadow database for Prisma migrations (avoids polluting main dev DB)
  postgres-shadow:
    image: postgres:18
    container_name: nexus-postgres-shadow
    restart: unless-stopped
    environment:
      POSTGRES_USER: nexus_user
      POSTGRES_PASSWORD: nexus_password
      POSTGRES_DB: nexus_shadow
    ports:
      - "5434:5432"
    volumes:
      - nexus-postgres-shadow-data:/var/lib/postgresql

  coturn:
    image: coturn/coturn:latest
    container_name: nexus-coturn
    restart: unless-stopped
    ports:
      - "3478:3478/udp"
      - "3478:3478/tcp"
      - "49152-49200:49152-49200/udp"
    command:
      - turnserver
      - --use-auth-secret
      - --static-auth-secret=nexus-turn-dev-secret
      - --realm=nexus.local
      - --min-port=49152
      - --max-port=49200
      - --no-tls
      - --no-dtls
      - --log-file=stdout
      - --simple-log

volumes:
  nexus-postgres-data:
  nexus-postgres-shadow-data:
  nexus-redis-data:
