name: Mobile iOS Build

# Disabled: iOS builds are done locally (no EAS cloud credits).
# See WARP.md "Mobile Build & Deploy Contract" for the local build process.
# To re-enable, uncomment the trigger below.
#
# on:
#   push:
#     branches:
#       - main
#     paths:
#       - 'apps/mobile/**'
#       - '!apps/mobile/android/**'
#       - 'apps/mobile/app.json'
on:
  workflow_dispatch:  # manual trigger only

jobs:
  build-ios:
    name: Build iOS with EAS
    runs-on: ubuntu-latest
    steps:
      - name: Check for relevant changes
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        working-directory: apps/mobile
        run: npm ci

      - name: Build and Submit to TestFlight
        working-directory: apps/mobile
        run: |
          eas build --platform ios --profile production --non-interactive
          eas submit --platform ios --latest --non-interactive
